name: Parliament Downloader

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      HEADLESS: true
      TIMEOUT: 120000
      DOWNLOAD_FOLDER: downloads
      TIME_ZONE: Asia/Kolkata
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Enforce IST window
        run: |
          node -e "const now=new Date(); const ist=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Kolkata'})); const hour=ist.getHours(); const inWindow = hour >= 19 && hour <= 21; if (!inWindow) { console.log('Outside IST window, skipping.'); process.exit(0); }"

      - name: Run downloader
        run: npm start
